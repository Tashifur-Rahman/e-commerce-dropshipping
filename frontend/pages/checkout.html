<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — DropShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Drop<span>Shop</span></a>
    <ul class="nav-links"><li><a href="../index.html">Home</a></li><li><a href="products.html">Products</a></li></ul>
    <div class="nav-right"><button class="nav-user-btn" id="nav-user-btn">Login</button></div>
  </div>
</nav>

<div class="page-header">
  <div class="container"><h1>Checkout</h1></div>
</div>

<div class="checkout-page">
  <div class="container">
    <div class="checkout-layout">
      <div class="card" style="padding:2rem">
        <h3 style="margin-bottom:1.5rem">Shipping Information</h3>
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" id="c-name" placeholder="John Doe" /></div>
          <div class="form-group"><label>Email</label><input type="email" id="c-email" placeholder="john@example.com" /></div>
        </div>
        <div class="form-group"><label>Address</label><input type="text" id="c-address" placeholder="123 Main Street" /></div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" id="c-city" placeholder="New York" /></div>
          <div class="form-group"><label>ZIP Code</label><input type="text" id="c-zip" placeholder="10001" /></div>
        </div>
        <h3 style="margin:1.5rem 0 1rem">Payment Method</h3>
        <div style="display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.5rem">
          <label style="display:flex;align-items:center;gap:.7rem;padding:.9rem 1rem;border:2px solid var(--accent);border-radius:8px;cursor:pointer">
            <input type="radio" name="payment" value="cod" checked /> Cash on Delivery
          </label>
          <label style="display:flex;align-items:center;gap:.7rem;padding:.9rem 1rem;border:2px solid var(--border);border-radius:8px;cursor:pointer">
            <input type="radio" name="payment" value="card" /> Credit / Debit Card (demo)
          </label>
        </div>
        <button class="btn btn-primary btn-block" onclick="placeOrder()">Place Order →</button>
      </div>

      <div>
        <div class="summary-card">
          <h3>Order Summary</h3>
          <div id="order-items"><div class="spinner-wrap"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>
async function loadSummary() {
  const cart = await CartAPI.get();
  if (!cart.items.length) { location.href='cart.html'; return; }
  document.getElementById('order-items').innerHTML = `
    ${cart.items.map(i=>`<div class="summary-row"><span>${i.name} ×${i.quantity}</span><span>${formatPrice(i.subtotal)}</span></div>`).join('')}
    <div class="summary-row total"><span>Total</span><span>${formatPrice(cart.total)}</span></div>`;
}

async function placeOrder() {
  const name=document.getElementById('c-name').value.trim();
  const email=document.getElementById('c-email').value.trim();
  const address=document.getElementById('c-address').value.trim();
  const city=document.getElementById('c-city').value.trim();
  const zip=document.getElementById('c-zip').value.trim();
  const payment=document.querySelector('input[name="payment"]:checked').value;
  if(!name||!email||!address||!city||!zip){ showToast('Please fill all fields','error'); return; }
  try {
    const res = await OrdersAPI.place({name,email,address,city,zip}, payment);
    showToast('Order placed successfully! 🎉');
    setTimeout(() => {
      document.querySelector('.checkout-page .container').innerHTML = `
        <div class="empty-state" style="padding:4rem">
          <div class="icon">✅</div>
          <h2>Order Confirmed!</h2>
          <p style="margin:.7rem 0 1.5rem">Order ID: <strong>${res.orderId}</strong><br>Total: <strong>${formatPrice(res.total)}</strong></p>
          <a href="products.html" class="btn btn-primary">Continue Shopping</a>
        </div>`;
    }, 800);
  } catch(e) { showToast(e.message,'error'); }
}
loadSummary();
</script>
</body>
</html>
