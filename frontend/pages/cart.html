<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — DropShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Drop<span>Shop</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
    <div class="nav-right">
      <button class="nav-cart-btn">🛒 <span class="cart-badge" id="cart-badge" style="display:none">0</span></button>
      <button class="nav-user-btn" id="nav-user-btn">Login</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">Home</a> › Cart</div>
    <h1>Your Cart</h1>
  </div>
</div>

<div class="cart-page">
  <div class="container">
    <div id="cart-content"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<footer><div class="container"><div class="footer-bottom">© 2025 DropShop</div></div></footer>
<div id="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>
async function loadCart() {
  const content = document.getElementById('cart-content');
  try {
    const cart = await CartAPI.get();
    if (!cart.items.length) {
      content.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><h3>Your cart is empty</h3><p>Go find something awesome!</p><a href="products.html" class="btn btn-primary mt-2">Shop Now</a></div>`;
      return;
    }
    content.innerHTML = `
      <div class="cart-layout">
        <div class="card" style="overflow:visible">
          <div style="padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <h3>Items (${cart.count})</h3>
            <button class="btn btn-outline btn-sm" onclick="clearCart()">Clear All</button>
          </div>
          <div id="items-list">
            ${cart.items.map(item => cartItemHTML(item)).join('')}
          </div>
        </div>
        <div>
          <div class="summary-card">
            <h3>Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span>${formatPrice(cart.total)}</span></div>
            <div class="summary-row"><span>Shipping</span><span style="color:var(--success)">Free</span></div>
            <div class="summary-row total"><span>Total</span><span>${formatPrice(cart.total)}</span></div>
            <a href="checkout.html" class="btn btn-primary btn-block mt-2">Proceed to Checkout →</a>
            <a href="products.html" class="btn btn-outline btn-block mt-1">Continue Shopping</a>
          </div>
        </div>
      </div>`;
  } catch (e) {
    content.innerHTML = `<p class="text-muted">Error loading cart: ${e.message}</p>`;
  }
}

function cartItemHTML(item) {
  return `<div class="cart-item">
    <img src="${item.image}" alt="${item.name}" onerror="this.src='https://placehold.co/80x80?text=P'">
    <div class="cart-item-info">
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-item-price">${formatPrice(item.price)} each</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="updateQty('${item.productId}', ${item.quantity - 1})">−</button>
        <span class="qty-num">${item.quantity}</span>
        <button class="qty-btn" onclick="updateQty('${item.productId}', ${item.quantity + 1})">+</button>
      </div>
      <button class="remove-btn" onclick="removeItem('${item.productId}')">✕ Remove</button>
    </div>
    <div style="font-weight:700;font-size:1.05rem">${formatPrice(item.subtotal)}</div>
  </div>`;
}

async function updateQty(productId, qty) {
  try { await CartAPI.update(productId, qty); loadCart(); updateCartBadge(); } catch(e) { showToast(e.message,'error'); }
}
async function removeItem(productId) {
  try { await CartAPI.remove(productId); loadCart(); updateCartBadge(); showToast('Item removed'); } catch(e) { showToast(e.message,'error'); }
}
async function clearCart() {
  try { await CartAPI.clear(); loadCart(); updateCartBadge(); showToast('Cart cleared'); } catch(e) { showToast(e.message,'error'); }
}

loadCart();
</script>
</body>
</html>
