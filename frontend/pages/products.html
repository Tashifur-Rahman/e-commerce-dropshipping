<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — DropShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Drop<span>Shop</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
    <div class="nav-right">
      <button class="nav-cart-btn" onclick="goTo('cart.html')">
        🛒 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
      <button class="nav-user-btn" id="nav-user-btn">Login</button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">Home</a> › Products</div>
    <h1>All Products</h1>
    <p>Discover our full range of curated products</p>
  </div>
</div>

<div class="section">
  <div class="container">
    <!-- Filters -->
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search products…" oninput="filterProducts()" />
      </div>
      <div style="display:flex;align-items:center;gap:.7rem;">
        <span style="font-size:.85rem;color:var(--text-muted)" id="product-count"></span>
        <select id="sort-select" onchange="filterProducts()" style="padding:.55rem .9rem;border:2px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--surface);">
          <option value="">Sort: Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>
    </div>

    <!-- Category Chips -->
    <div class="category-chips" id="chips">
      <button class="chip active" data-cat="">All</button>
      <button class="chip" data-cat="Electronics">Electronics</button>
      <button class="chip" data-cat="Fashion">Fashion</button>
      <button class="chip" data-cat="Home & Office">Home & Office</button>
      <button class="chip" data-cat="Sports">Sports</button>
    </div>

    <!-- Grid -->
    <div class="grid-4" id="products-grid">
      <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-bottom">© 2025 DropShop. All rights reserved.</div>
  </div>
</footer>

<div id="toast-container"></div>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>
  let allProducts = [];
  let activeCategory = '';

  // Pre-select category from URL ?category=
  const urlCat = new URLSearchParams(location.search).get('category');
  if (urlCat) activeCategory = urlCat;

  async function loadProducts() {
    try {
      allProducts = await ProductsAPI.getAll();
      if (urlCat) {
        document.querySelectorAll('.chip').forEach(c => {
          c.classList.toggle('active', c.dataset.cat === urlCat);
        });
      }
      filterProducts();
    } catch {
      document.getElementById('products-grid').innerHTML =
        `<p class="text-muted" style="grid-column:1/-1">Could not load products. Is the backend running on port 5000?</p>`;
    }
  }

  function filterProducts() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const sort   = document.getElementById('sort-select').value;

    let filtered = allProducts.filter(p => {
      const matchCat  = !activeCategory || p.category === activeCategory;
      const matchSearch = !search || p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search);
      return matchCat && matchSearch;
    });

    if (sort === 'price-asc')  filtered.sort((a, b) => a.price - b.price);
    if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
    if (sort === 'rating')     filtered.sort((a, b) => b.rating - a.rating);

    document.getElementById('product-count').textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
    renderGrid(filtered);
  }

  function renderGrid(products) {
    const grid = document.getElementById('products-grid');
    if (!products.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🔍</div><h3>No products found</h3>
        <p>Try adjusting your filters or <a href="../index.html" style="color:var(--accent)">load sample data</a>.</p>
      </div>`;
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="card product-card" onclick="goTo('product-detail.html?id=${p._id}')">
        <div class="img-wrap">
          <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=Product'">
          ${p.featured ? '<span class="badge">Featured</span>' : ''}
        </div>
        <div class="card-body">
          <div class="category">${p.category}</div>
          <h3>${p.name}</h3>
          <div style="display:flex;align-items:center;gap:.4rem;margin-top:.3rem">
            ${renderStars(p.rating)}
            <span class="reviews">(${p.reviews})</span>
          </div>
          <div class="price-row">
            <span class="price">${formatPrice(p.price)}</span>
            <button class="add-btn" onclick="event.stopPropagation();addToCart('${p._id}')">+ Cart</button>
          </div>
        </div>
      </div>`
    ).join('');
  }

  async function addToCart(productId) {
    try {
      await CartAPI.add(productId);
      showToast('Added to cart! 🛒');
      updateCartBadge();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // Category chip click
  document.getElementById('chips').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCategory = chip.dataset.cat;
    filterProducts();
  });

  loadProducts();
</script>
</body>
</html>
